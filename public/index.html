<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light only">
  <title>Sudoku X</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="lobby-body">

  <div class="lobby-screen">

    <!-- Hero -->
    <div class="lobby-hero">
      <div class="lobby-logo">✕</div>
      <h1 class="lobby-title">Sudoku X</h1>
      <p class="lobby-sub">Cooperativo · Tiempo real</p>
    </div>

    <!-- Nombre -->
    <div class="name-row">
      <input
        type="text"
        id="player-name"
        class="name-input"
        placeholder="Tu nombre"
        maxlength="14"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
    </div>

    <!-- Continuar partida (solo si hay guardado) -->
    <div id="continue-card" class="action-card continue-card hidden">
      <div class="action-card-left">
        <span class="action-icon">▶</span>
        <div>
          <div class="action-title">Continuar</div>
          <div id="continue-meta" class="action-meta"></div>
        </div>
      </div>
      <button id="btn-continue" class="pill-btn pill-continue">Retomar</button>
    </div>

    <!-- Dificultad -->
    <div class="diff-row">
      <span class="diff-label">Dificultad</span>
      <div class="diff-pills">
        <button class="diff-btn" data-diff="easy">Fácil</button>
        <button class="diff-btn active" data-diff="hard">Difícil</button>
      </div>
    </div>

    <!-- Acciones principales -->
    <div class="main-actions">
      <button id="btn-create" class="main-btn main-btn-primary">
        <span class="main-btn-icon">＋</span>
        <span>Nueva sala</span>
      </button>
      <button id="btn-custom" class="main-btn main-btn-secondary">
        <span class="main-btn-icon">✎</span>
        <span>Tablero propio</span>
      </button>
    </div>

    <!-- Unirse -->
    <div class="join-row">
      <input
        type="text"
        id="room-code-input"
        class="code-input"
        placeholder="Código de sala"
        maxlength="4"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button id="btn-join" class="join-btn">Unirse</button>
    </div>

    <div id="error-message" class="error-msg hidden"></div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="lobby.js"></script>
</body>
</html>
