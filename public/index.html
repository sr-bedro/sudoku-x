<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku X — Multijugador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lobby-container">
    <h1 class="title">Sudoku X</h1>
    <p class="subtitle">Modo cooperativo multijugador</p>

    <div class="card">

      <!-- Opción 1: tablero aleatorio -->
      <div class="option-section">
        <h2>Partida aleatoria</h2>
        <p>El tablero se genera automáticamente</p>
        <button id="btn-create" class="btn btn-primary">Crear sala</button>
      </div>

      <div class="divider">— o —</div>

      <!-- Opción 2: tablero propio -->
      <div class="option-section">
        <h2>Tablero propio</h2>
        <p>Cargás vos los números y luego empezás la partida</p>
        <button id="btn-custom" class="btn btn-custom">Crear tablero</button>
      </div>

      <div class="divider">— o —</div>

      <!-- Opción 3: unirse -->
      <div class="option-section">
        <h2>Unirse a sala</h2>
        <p>Ingresá el código que te mandó tu compañero</p>
        <div class="input-group">
          <input
            type="text"
            id="room-code-input"
            class="code-input"
            placeholder="Ej: K4M9"
            maxlength="4"
          >
          <button id="btn-join" class="btn btn-secondary btn-join">Unirse</button>
        </div>
      </div>

      <div id="error-message" class="error-msg hidden"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="lobby.js"></script>
</body>
</html>
